# Render Blueprint for Enterprise Meet.
# The service names below determine the onrender.com URLs used by the frontend.
# If you rename either public service, update VITE_API_URL, VITE_WS_URL,
# FRONTEND_URL, and CORS_ORIGINS together.
services:
  - type: web
    name: enterprise-meet-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: REFRESH_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: enterprise-meet-db
          property: connectionString
      - key: DATABASE_SYNC_URL
        fromDatabase:
          name: enterprise-meet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: enterprise-meet-redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://enterprise-meet-web.onrender.com
      - key: CORS_ORIGINS
        value: '["https://enterprise-meet-web.onrender.com"]'
      # Use a publicly reachable TURN provider for reliable calls across NATs.
      - key: TURN_SERVER_URL
        sync: false
      - key: TURN_SERVER_USERNAME
        sync: false
      - key: TURN_SERVER_CREDENTIAL
        sync: false
      - key: FIRST_ADMIN_PASSWORD
        sync: false

  - type: web
    name: enterprise-meet-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://enterprise-meet-api.onrender.com
      - key: VITE_WS_URL
        value: wss://enterprise-meet-api.onrender.com
    routes:
      # Lets a copied /room/:code URL load the React app directly.
      - type: rewrite
        source: /*
        destination: /index.html

  - type: keyvalue
    name: enterprise-meet-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: enterprise-meet-db
    region: singapore
    plan: basic-256mb
    databaseName: enterprisemeet
    user: meetadmin
