# Coturn TURN Server Configuration
# Enterprise Meet — Production TURN/STUN Server

# Listening port
listening-port=3478
tls-listening-port=5349

# Relay ports range (must match docker-compose port mappings)
min-port=50000
max-port=50100

# Realm (used for authentication)
realm=enterprisemeet.local

# TURN credentials (long-term credentials mechanism)
user=meetuser:meetpassword

# Use fingerprint
fingerprint

# Use long-term credentials
lt-cred-mech

# Logging
log-file=stdout
simple-log

# Quota — max relay sessions per user
user-quota=100
total-quota=1200

# Deny plain-text (require TURN over TLS in production)
# no-tlsv1
# no-tlsv1_1

# Disable UDP relay if needed (enable for WebRTC)
# no-udp-relay

# Disable TCP relay if needed
# no-tcp-relay

# Security — don't reveal version
no-software-attribute

# Process as daemon (disabled for Docker)
# daemon

# Verbose logging for debugging (disable in production)
# verbose
