version: "3.9"

services:
  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+asyncpg://meetadmin:meetpassword@postgres:5432/enterprisemeet
      DATABASE_SYNC_URL: postgresql://meetadmin:meetpassword@postgres:5432/enterprisemeet
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadminpassword}
      MINIO_SECURE: "false"
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-please-change-in-production}
      REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY:-dev-refresh-secret-key-please-change}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      TURN_SERVER_URL: turn:coturn:3478
      TURN_SERVER_USERNAME: ${TURN_USER:-meetuser}
      TURN_SERVER_CREDENTIAL: ${TURN_PASSWORD:-meetpassword}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    networks:
      - backend

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q celery,email,notifications
    environment:
      DATABASE_SYNC_URL: postgresql://meetadmin:meetpassword@postgres:5432/enterprisemeet
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadminpassword}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - redis
      - postgres
    networks:
      - backend

  # ── Celery Beat (Scheduler) ───────────────────────────────────────────────────
  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      DATABASE_SYNC_URL: postgresql://meetadmin:meetpassword@postgres:5432/enterprisemeet
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
      - postgres
    networks:
      - backend

  # ── Flower (Celery Monitoring) ─────────────────────────────────────────────
  flower:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
      - worker
    networks:
      - backend

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: meetadmin
      POSTGRES_PASSWORD: meetpassword
      POSTGRES_DB: enterprisemeet
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetadmin -d enterprisemeet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── MinIO (Object Storage) ────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadminpassword}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - backend

  # ── Coturn (TURN/STUN Server) ─────────────────────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"       # TLS
      - "5349:5349/udp"   # DTLS
      - "50000-50100:50000-50100/udp"  # relay ports
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: -c /etc/coturn/turnserver.conf
    networks:
      - backend

  # ── MailHog (Dev Email) ───────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - backend

  # ── Nginx (Reverse Proxy) ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - backend

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  backend:
    driver: bridge
