worker_processes auto;
events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # API proxy
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # WebSocket proxy (the FastAPI router is mounted at /api/v1).
        # This needs its own location because the regular API proxy does not
        # forward connection-upgrade headers.
        location /api/v1/ws/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # Health check
        location /health {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        # Metrics (internal only)
        location /metrics {
            proxy_pass http://api;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny all;
        }

        # Docs (disable in production)
        location /docs {
            proxy_pass http://api;
        }

        location /redoc {
            proxy_pass http://api;
        }

        location /openapi.json {
            proxy_pass http://api;
        }
    }
}
